name: Pull Request Workflow
on:
  pull_request:
    branches: [main]
jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@56d6a583f00f6bad6d19d91d53a7bc3b8143d0e9 # v5.1.1
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.14.5

      - name: Initialize Terraform
        run: terraform init --backend-config=sandbox.config
        
      - name: Lint Terraform
        run: terraform fmt -check

      - name: Run Terraform Plan
        run: terraform plan -var-file=sandbox.tfvars -out=tfplan.bin

      - name: Show Terraform Plan
        run: terraform show --no-color tfplan.bin >> $GITHUB_STEP_SUMMARY
